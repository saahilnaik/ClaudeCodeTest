<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brick Breaker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas {
      display: block;
      border-radius: 10px;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.25);
    }
    #controls-hint {
      margin-top: 12px;
      color: #555;
      font-size: 0.78rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="c" width="480" height="600"></canvas>
  <div id="controls-hint">MOUSE or ← → to move &nbsp;|&nbsp; SPACE / CLICK to launch &nbsp;|&nbsp; R to restart</div>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // ── Constants ──────────────────────────────────────────────
    const PADDLE_W = 88, PADDLE_H = 12, PADDLE_Y = H - 50;
    const BALL_R   = 8;
    const BRICK_COLS = 8, BRICK_ROWS = 6;
    const BRICK_GAP  = 6;
    const BRICK_TOP  = 70;
    const BASE_SPEED = 4.5;
    const SPEED_CAP  = BASE_SPEED * 2.5;
    const SPEED_STEP = 30;   // pts between speed ticks
    const SPEED_MULT = 1.07;
    const KEY_SPEED  = 5;    // px per frame for arrow keys

    // Row colours & point values (index 0 = top row)
    const ROW_COLORS = ['#ff6b6b','#ff9f43','#ffd32a','#26de81','#45aaf2','#a55eea'];
    const ROW_PTS    = [6, 5, 4, 3, 2, 1];

    // ── State ──────────────────────────────────────────────────
    let paddle, ball, bricks, score, lives, highScore, state, flashFrames, levelSpeedBonus;
    // states: 'idle' | 'playing' | 'dead' | 'gameover' | 'levelclear'
    let deadTimer = 0, levelClearTimer = 0;
    let keys = {};
    let newHighScoreFlash = 0; // frames to flash gold BEST label

    function loadHighScore() {
      return parseInt(localStorage.getItem('bbHighScore') || '0', 10);
    }
    function saveHighScore(v) {
      localStorage.setItem('bbHighScore', String(v));
    }

    // ── Init / Reset ───────────────────────────────────────────
    function init() {
      highScore       = loadHighScore();
      score           = 0;
      lives           = 3;
      levelSpeedBonus = 0;
      state           = 'idle';
      newHighScoreFlash = 0;
      resetPaddle();
      resetBall();
      buildBricks();
    }

    function resetPaddle() {
      paddle = { x: (W - PADDLE_W) / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
    }

    function resetBall() {
      ball = {
        x:  W / 2,
        y:  PADDLE_Y - BALL_R - 2,
        dx: 0,
        dy: 0,
        attached: true   // sits on paddle until launched
      };
    }

    function buildBricks() {
      bricks = [];
      const totalGap = BRICK_GAP * (BRICK_COLS + 1);
      const bw = (W - totalGap) / BRICK_COLS;
      const bh = 22;
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({
            x: BRICK_GAP + c * (bw + BRICK_GAP),
            y: BRICK_TOP + r * (bh + BRICK_GAP),
            w: bw, h: bh,
            alive: true,
            color: ROW_COLORS[r],
            pts:   ROW_PTS[r]
          });
        }
      }
    }

    // ── Speed calculation ──────────────────────────────────────
    function currentSpeed() {
      const ticks = Math.floor(score / SPEED_STEP);
      const s = BASE_SPEED * Math.pow(SPEED_MULT, ticks) + levelSpeedBonus;
      return Math.min(s, SPEED_CAP);
    }

    function launch() {
      if (!ball.attached) return;
      const spd = currentSpeed();
      // Aim slightly random left/right
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
      ball.dx = spd * Math.cos(angle);
      ball.dy = spd * Math.sin(angle);
      ball.attached = false;
      state = 'playing';
    }

    // ── Update ─────────────────────────────────────────────────
    function update() {
      movePaddle();

      if (ball.attached) {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - BALL_R - 2;
      }

      if (state === 'playing') {
        moveBall();
        checkBricks();
        checkLifeLost();
        checkLevelClear();
      }

      if (state === 'dead') {
        deadTimer--;
        if (deadTimer <= 0) {
          if (lives <= 0) {
            state = 'gameover';
          } else {
            resetBall();
            state = 'idle';
          }
        }
      }

      if (state === 'levelclear') {
        levelClearTimer--;
        if (levelClearTimer <= 0) {
          levelSpeedBonus += 0.4;
          buildBricks();
          resetBall();
          state = 'idle';
        }
      }

      if (newHighScoreFlash > 0) newHighScoreFlash--;
    }

    function movePaddle() {
      // Arrow keys
      if (keys['ArrowLeft'])  paddle.x -= KEY_SPEED;
      if (keys['ArrowRight']) paddle.x += KEY_SPEED;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    }

    function moveBall() {
      // Re-normalise speed each frame so score changes take effect
      if (!ball.attached) {
        const spd = currentSpeed();
        const cur = Math.hypot(ball.dx, ball.dy);
        if (cur > 0) {
          ball.dx = (ball.dx / cur) * spd;
          ball.dy = (ball.dy / cur) * spd;
        }
      }

      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall bounces
      if (ball.x - BALL_R < 0)   { ball.x = BALL_R;     ball.dx = Math.abs(ball.dx); }
      if (ball.x + BALL_R > W)   { ball.x = W - BALL_R; ball.dx = -Math.abs(ball.dx); }
      if (ball.y - BALL_R < 0)   { ball.y = BALL_R;     ball.dy = Math.abs(ball.dy); }

      // Paddle collision
      if (
        ball.dy > 0 &&
        ball.x > paddle.x && ball.x < paddle.x + paddle.w &&
        ball.y + BALL_R >= paddle.y && ball.y + BALL_R <= paddle.y + paddle.h + Math.abs(ball.dy)
      ) {
        ball.y = paddle.y - BALL_R;
        // Angle based on offset from paddle centre (-1 to 1)
        const offset = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const maxAngle = Math.PI * 0.38;
        const angle = offset * maxAngle - Math.PI / 2;
        const spd = currentSpeed();
        ball.dx = spd * Math.cos(angle);
        ball.dy = spd * Math.sin(angle);
      }
    }

    function checkBricks() {
      for (const b of bricks) {
        if (!b.alive) continue;
        if (
          ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h
        ) {
          b.alive = false;
          // Determine which side was hit for correct reflection
          const overlapL = (ball.x + BALL_R) - b.x;
          const overlapR = (b.x + b.w)  - (ball.x - BALL_R);
          const overlapT = (ball.y + BALL_R) - b.y;
          const overlapB = (b.y + b.h)  - (ball.y - BALL_R);
          const minH = Math.min(overlapL, overlapR);
          const minV = Math.min(overlapT, overlapB);
          if (minH < minV) ball.dx = -ball.dx;
          else             ball.dy = -ball.dy;

          // Score
          score += b.pts;
          if (score > highScore) {
            highScore = score;
            saveHighScore(highScore);
            newHighScoreFlash = 90;
          }
          break; // one brick per frame
        }
      }
    }

    function checkLifeLost() {
      if (ball.y - BALL_R > H) {
        lives--;
        state     = 'dead';
        deadTimer = 50; // ~0.83s at 60fps
      }
    }

    function checkLevelClear() {
      if (bricks.every(b => !b.alive)) {
        state           = 'levelclear';
        levelClearTimer = 90; // 1.5s
      }
    }

    // ── Draw ───────────────────────────────────────────────────
    function draw() {
      // Background
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, W, H);

      drawBricks();
      drawPaddle();
      if (state !== 'gameover') drawBall();
      drawHUD();

      if (state === 'idle')       drawOverlay('idle');
      if (state === 'levelclear') drawOverlay('levelclear');
      if (state === 'gameover')   drawOverlay('gameover');
    }

    function drawBricks() {
      for (const b of bricks) {
        if (!b.alive) continue;
        // Brick body
        ctx.fillStyle = b.color;
        roundRect(b.x, b.y, b.w, b.h, 5);
        ctx.fill();
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        roundRect(b.x + 2, b.y + 2, b.w - 4, b.h / 2 - 2, 3);
        ctx.fill();
      }
    }

    function drawPaddle() {
      const g = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
      g.addColorStop(0, '#ff6b8a');
      g.addColorStop(1, '#e94560');
      ctx.fillStyle = g;
      roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
      ctx.fill();
    }

    function drawBall() {
      const g = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_R);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(1, '#a8dadc');
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    function drawHUD() {
      // Lives (hearts)
      ctx.font = '18px sans-serif';
      ctx.textBaseline = 'top';
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i < lives ? '#e94560' : '#333';
        ctx.fillText('♥', 12 + i * 26, 10);
      }

      // Score (centre)
      ctx.textAlign = 'center';
      ctx.font = 'bold 18px Segoe UI';
      ctx.fillStyle = '#fff';
      ctx.fillText(score, W / 2, 10);
      ctx.font = '11px Segoe UI';
      ctx.fillStyle = '#666';
      ctx.fillText('SCORE', W / 2, 30);

      // High score (right)
      ctx.textAlign = 'right';
      const flash = newHighScoreFlash > 0 && Math.floor(newHighScoreFlash / 8) % 2 === 0;
      ctx.font = 'bold 18px Segoe UI';
      ctx.fillStyle = flash ? '#fff' : '#ffd700';
      ctx.fillText(highScore, W - 12, 10);
      ctx.font = '11px Segoe UI';
      ctx.fillStyle = '#ffd70088';
      ctx.fillText('BEST', W - 12, 30);

      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    function drawOverlay(type) {
      // Dim
      ctx.fillStyle = 'rgba(10,10,20,0.72)';
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (type === 'idle') {
        ctx.font = 'bold 36px Segoe UI';
        ctx.fillStyle = '#e94560';
        ctx.fillText('BRICK BREAKER', W / 2, H / 2 - 50);
        ctx.font = '16px Segoe UI';
        ctx.fillStyle = '#a8dadc';
        ctx.fillText('CLICK or press SPACE to launch', W / 2, H / 2 + 10);
        ctx.font = '13px Segoe UI';
        ctx.fillStyle = '#555';
        ctx.fillText('Mouse / Arrow keys to move paddle', W / 2, H / 2 + 38);
      }

      if (type === 'levelclear') {
        ctx.font = 'bold 34px Segoe UI';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('LEVEL CLEAR!', W / 2, H / 2 - 16);
        ctx.font = '16px Segoe UI';
        ctx.fillStyle = '#a8dadc';
        ctx.fillText('Get ready for the next wave…', W / 2, H / 2 + 24);
      }

      if (type === 'gameover') {
        ctx.font = 'bold 38px Segoe UI';
        ctx.fillStyle = '#e94560';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 70);

        ctx.font = '20px Segoe UI';
        ctx.fillStyle = '#fff';
        ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 20);

        ctx.font = 'bold 22px Segoe UI';
        ctx.fillStyle = '#ffd700';
        ctx.fillText(`Best: ${highScore}`, W / 2, H / 2 + 20);

        if (score >= highScore && score > 0) {
          ctx.font = '14px Segoe UI';
          ctx.fillStyle = '#ffd700';
          ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 52);
        }

        ctx.font = '16px Segoe UI';
        ctx.fillStyle = '#a8dadc';
        ctx.fillText('Press R or click to play again', W / 2, H / 2 + 85);
      }

      ctx.textAlign    = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    // ── Helper: rounded rect ───────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ── Input ──────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') {
        e.preventDefault();
        if (state === 'idle') launch();
        if (state === 'gameover') restart();
      }
      if (e.key === 'r' || e.key === 'R') {
        if (state === 'gameover') restart();
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx   = (e.clientX - rect.left) * (W / rect.width);
      paddle.x   = mx - paddle.w / 2;
      paddle.x   = Math.max(0, Math.min(W - paddle.w, paddle.x));
    });

    canvas.addEventListener('click', () => {
      if (state === 'idle')    launch();
      if (state === 'gameover') restart();
    });

    function restart() {
      score           = 0;
      lives           = 3;
      levelSpeedBonus = 0;
      newHighScoreFlash = 0;
      resetPaddle();
      resetBall();
      buildBricks();
      state = 'idle';
    }

    // ── Game loop ──────────────────────────────────────────────
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    init();
    loop();
  })();
  </script>
</body>
</html>
